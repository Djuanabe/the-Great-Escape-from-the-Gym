<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bound - Stage Editor</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">Bound Stage Editor</span>
    <div class="group" id="tools">
      <button class="tool active" data-tool="select">選択/移動</button>
      <button class="tool" data-tool="hole">穴</button>
      <button class="tool" data-tool="wall">壁</button>
      <button class="tool" data-tool="mover">移動壁</button>
      <button class="tool" data-tool="island">浮島</button>
      <button class="tool" data-tool="star">スター</button>
    </div>
    <span class="sep"></span>
    <div class="group">
      <button id="btnPlay" class="primary">▶ テストプレイ</button>
      <button id="btnNew">新規</button>
    </div>
    <span class="sep"></span>
    <div class="group">
      <label style="color:#555;">表示倍率</label>
      <input id="zoom" type="range" min="0.4" max="1.4" step="0.05" value="0.74" style="width:90px;">
    </div>
  </div>

  <div id="main">
    <div id="stageWrap">
      <div id="canvasArea">
        <canvas id="cv" width="960" height="540"></canvas>
      </div>
      <div id="ruler">
        <span class="lbl" id="posLbl">0 m</span>
        <input id="scroll" type="range" min="0" max="6000" step="1" value="0">
        <span class="lbl" id="lenLbl" style="text-align:right;">全長 600 m</span>
      </div>
    </div>

    <div id="side">
      <div class="panel" id="inspector">
        <h2>インスペクタ</h2>
        <div id="inspBody"><p class="empty">オブジェクトを選択してください</p></div>
      </div>

      <div class="panel">
        <h2>ステージ設定</h2>
        <div class="row"><label>名前 (JP)</label><input id="m_name" type="text" value="新ステージ"></div>
        <div class="row"><label>名前 (EN)</label><input id="m_en" type="text" value="New Stage"></div>
        <div class="row"><label>説明</label><input id="m_hint" type="text" value=""></div>
        <div class="row" style="align-items:flex-start;"><label>解放スキル<br><span style="font-weight:400;color:#999;">(全て必要)</span></label>
          <div id="m_req" class="reqlist">
            <label><input type="checkbox" value="high"> ハイアーチ</label>
            <label><input type="checkbox" value="slow"> エアブレーキ</label>
            <label><input type="checkbox" value="white"> ホワイトチェンジ</label>
            <label><input type="checkbox" value="revive"> リバイブ</label>
            <label><input type="checkbox" value="break"> ブレイクチャージ</label>
          </div>
        </div>
        <div class="row"><label>全長</label>
          <input id="m_length" type="number" value="6000" step="100"><span class="unit">px</span></div>
      </div>

      <div class="panel">
        <h2>物理パラメータ</h2>
        <div class="row"><label>重力 G</label><input id="p_G" type="number" value="3200" step="50"></div>
        <div class="row"><label>ジャンプ初速</label><input id="p_BASE_VY" type="number" value="920" step="10"></div>
        <div class="row"><label>基本速度</label><input id="p_BASE_VX" type="number" value="340" step="10"></div>
        <div class="row"><label>チャージ加速</label><input id="p_BOOST_MAX" type="number" value="330" step="10"></div>
        <div class="row"><label>高度低下率</label><input id="p_HEIGHT_PEN" type="number" value="0.45" step="0.01"></div>
        <div class="row"><label>チャージ時間</label><input id="p_CHARGE_TIME" type="number" value="0.72" step="0.02"></div>
        <div class="row"><label>距離加速</label><input id="p_SPEED_ACCEL" type="number" value="0.012" step="0.002"></div>
        <div class="row"><label>加速上限</label><input id="p_SPEED_EXTRA_MAX" type="number" value="520" step="20"></div>
        <p class="hint">変更すると軌道が変わります。テストプレイで確認してください。</p>
      </div>

      <div class="panel">
        <h2>保存 / 読み込み</h2>
        <div class="io-btns">
          <button id="btnToGame" class="primary">ゲームへ送る</button>
          <button id="btnFromGame">ゲームから読込</button>
        </div>
        <div class="io-btns">
          <button id="btnExport">JSON出力</button>
          <button id="btnImport">JSON取込</button>
          <button id="btnDownload">.json保存</button>
        </div>
        <textarea id="io" placeholder="ここにJSONが出力されます。貼り付けて「JSON取込」で読み込めます。"></textarea>
      </div>

      <div class="panel">
        <h2>操作ヘルプ</h2>
        <p class="hint">
          ツールを選んでキャンバスをクリックで配置。<br>
          <b>選択/移動</b>でドラッグして移動、<kbd>Delete</kbd>で削除、矢印キーで微調整。<br>
          <b>浮島</b>は穴の中をクリックで付与/解除。<br>
          背景をドラッグ or ホイールで横スクロール。<br>
          テストプレイ：<kbd>Space</kbd>/クリックでチャージ、空中で押すと色チェンジ。<kbd>Esc</kbd>で編集へ戻る。
        </p>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="engine.js"></script>
<script src="editor.js"></script>
</body>
</html>
